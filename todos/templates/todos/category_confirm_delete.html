{% extends 'todos/base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="form-card text-center">
    <h3>Delete Category?</h3>
    <p class="text-muted">Delete "<strong>{{ category.name }}</strong>"? Tasks in this category will become uncategorized.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
