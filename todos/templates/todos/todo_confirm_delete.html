{% extends 'todos/base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="form-card text-center">
    <h3>Delete Task?</h3>
    <p class="text-muted">Are you sure you want to delete "<strong>{{ todo.title }}</strong>"? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'todo_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
